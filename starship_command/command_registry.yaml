first_integration_tests:
  open_webui_to_lm_studio_zero_code:
    id: open_webui_to_lm_studio_zero_code
    priority: 1
    purpose: Record the existing user-verified manual bridge from Open WebUI to LM Studio without Starship code changes.
    current_state: User verified LM Studio hosts local models and Open WebUI is connected to LM Studio.
    steps:
      - Confirm from the user-facing Open WebUI session that a local LM Studio-hosted model can answer a simple prompt.
      - Record the working endpoint and model name only if the user chooses to provide it.
      - Keep connections limited to trusted local endpoints.
    success_evidence:
      - User confirms the model answered through Open WebUI.
      - Endpoint and model name are recorded as manual availability, not Starship callability.
    do_not_do:
      - Do not scan ports.
      - Do not inspect running processes.
      - Do not modify Open WebUI or LM Studio settings.
      - Do not add Starship runtime integrations in this test.
  qwen2_5_coder_14b_engineering_behavior:
    id: qwen2_5_coder_14b_engineering_behavior
    priority: 2
    purpose: Measure whether qwen2.5-coder-14b-instruct is useful and fast enough as the first Engineering local-model assistant.
    target_model: qwen2_5_coder_14b_instruct
    access_surface: Manual Open WebUI or LM Studio session, whichever is easiest after user verification.
    prompt_shape:
      - Give it a small code-inspection or test-drafting prompt.
      - Provide only copied context selected by the user or current Codex session.
      - Ask for explanation or a proposed test; do not let it edit files directly.
    measurements:
      - Response latency.
      - Correctness and usefulness of code reasoning.
      - Whether the output is concise enough for a working Engineering session.
    fallback:
      - If qwen2.5-coder-14b-instruct is too slow, test qwen2.5-3b-instruct as a faster temporary Engineering triage target despite lower expected capability.
    success_evidence:
      - Manual bridge call succeeded through LM Studio.
      - Observed latency was 20.199s.
      - Response was coherent but shallow and misunderstood the routing-test task as a game/gameplay scenario.
      - Human-observed context window was 2048.
      - Decision is pending higher-context retest, ideally 8192 or higher if hardware allows.
    retest_required:
      - Retest Coder-14B at a higher context window before assigning it as an Engineering deep-consult resource.
      - If higher context is too slow, classify it as deep consult only or test qwen2.5-3b-instruct as a faster temporary triage model.
      - Do not use Coder-14B for routine First Officer chatter until latency and usefulness are verified.
    do_not_do:
      - Do not build Starship infrastructure around Coder-14B until usefulness and response speed are verified.
      - Do not permit direct file edits in this behavior test.

