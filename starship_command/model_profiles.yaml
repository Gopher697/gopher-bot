version: 1

setting_control:
  context_length:
    classification: load_time_controlled
    source: "lms load --context-length; visible through lms ps --json as contextLength when loaded"
  gpu_offload:
    classification: unknown
    source: "Not currently controlled by Starship; may be an LM Studio GUI/runtime setting unless a safe CLI/API path is discovered."
  cpu_threads:
    classification: unknown
    source: "Not currently exposed by Starship Model Operations."
  batch_size:
    classification: unknown
    source: "Not currently exposed by Starship Model Operations."
  thinking_mode:
    classification: manual_only
    source: "Not currently controlled by the Starship OpenAI-compatible payload; live value is unknown unless LM Studio exposes it."
  temperature:
    classification: inference_payload_controlled
    source: "Sent by Starship in chat/completions payload."
  top_p:
    classification: inference_payload_controlled
    source: "Sent by Starship in chat/completions payload; endpoint support is verified by call success/failure."
  top_k:
    classification: inference_payload_controlled
    source: "Sent by Starship in chat/completions payload; endpoint support is verified by call success/failure."
  max_tokens:
    classification: inference_payload_controlled
    source: "Sent by Starship in chat/completions payload."
  structured_output:
    classification: starship_controlled
    source: "Profile setting; false means no structured response_format is sent."
  stop_strings:
    classification: inference_payload_controlled
    source: "Sent by Starship only when configured in the profile."
  context_overflow_behavior:
    classification: unknown
    source: "Not currently exposed by Starship Model Operations."

profiles:
  first_officer_triage:
    display_name: First Officer Triage
    intended_models:
      - qwen/qwen3.5-9b
      - qwen2.5-3b-instruct
      - mistralai/ministral-3-14b-reasoning
      - google/gemma-4-26b-a4b
    load_time:
      context_target: 8192
      gpu_offload_policy: estimate_safe
      captain_authorization_required_for_runtime_changes: true
    inference:
      temperature: 0.1
      top_p: 0.8
      top_k: 40
      max_tokens: 500
      structured_output: false
      stop_strings: []
    runtime:
