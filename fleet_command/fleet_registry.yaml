version: 1

fleet_commander: Gopher
fleet_phase: bootstrap
doctrine_version: initial
command_layer_role: top-level command system

ship_local_isolation: true
fleet_absorbs_raw_ship_memory: false
fleet_receives_structured_reports: true
fleet_extracts_reusable_doctrine: true

ship_package_policy:
  ships_are_persistent_reusable_packages: true
  ships_are_projects: false
  ships_are_single_purpose_agents_by_default: false
  ships_can_take_multiple_missions_over_time: true
  mission_context_stays_separate_from_ship_identity: true
  ship_local_knowledge_isolated: true
  fleet_receives_structured_reports: true
  fleet_extracts_reusable_doctrine: true

mission_policy:
  projects_are_missions_or_dossiers: true
  missions_can_be_revisited: true
  missions_do_not_define_ship_identity_by_default: true
  mission_dossiers_remain_ship_local_unless_promoted: true

ships:
  - id: starship_command
    name: Starship Command
    status: drydock
    path: 'D:\gopher-workbench-mcp\starship_command'
    package_id: starship_command
    package_path: starship_command
    role: current drydock ship package / command-system prototype
    folder_identity_note: Current folder name is the ship package path, not Fleet Command itself.
    commissioned: false
    ship_captain_role: defined
    first_officer_role: defined
    can_receive_multiple_missions_over_time: true
    mission_dossier_policy: project missions remain dossiers/assignments unless promoted through structured reports
    chain_of_command:
      - Fleet Commander
      - Fleet Command Staff
      - Ship Captain
      - First Officer
      - Divisions
      - Specialists
    commissioning_condition: 'First Officer receives order -> routes to crew/tool/model -> useful artifact returns through GUI -> no terminal use by Fleet Commander'
    local_knowledge_policy: isolated ship-local knowledgebase; reports promoted selectively to Fleet Command
    current_known_capabilities:
      - Command Operations GUI
      - Model Operations
      - local LM Studio bridge
      - Crew Prompt Pack
      - Crew Output Validation
      - Model Profile Management
    current_blockers:
      - no completed terminal-free useful artifact loop yet
      - local models not trusted as autonomous crew
      - First Officer/crew loop still needs commissioning mission
    report_template: fleet_command/SHIP_REPORT_TEMPLATE.md
