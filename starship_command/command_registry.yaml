template_defaults:
  limitation: This is template-based output from Starship Command Operations V1; it is rule-based, not LLM-generated.
  unknown_placeholder: "[[UNKNOWN: fill in before use]]"
  no_agent_launched: No autonomous agent was launched; this is only a tracked specialist brief and session-state record.
  no_commit_boundary: Do not commit unless explicitly instructed.
  repo_change_git_status_instruction: Show git status --short after changes.
  retirement_condition: Retire this specialist brief when the bounded mission output is delivered, when required context contradicts the route, or when scope changes enough to require First Officer rerouting.
  escalation_rules:
    - Escalate to First Officer if route confidence is low or the division boundary is unclear.
    - Escalate to Tactical / Safety before destructive, credential, live-runtime, overwrite, external-repo, or unclear-authority actions.
    - Escalate to Computer Core / Archives when old notes, raw imports, or handoffs must be promoted into current authority.
  required_context:
    - Local AGENTS.md or project instructions.
    - WORKBENCH_INDEX.md and PROJECT_REGISTRY.md when operating inside the Workbench layer.
    - The matched project's configured entrypoint files.
    - Current git status before any repo change.
  safety_boundaries:
    - Stay inside the named project and expected file scope.
    - Treat session notes, raw imports, archives, and old handoffs as historical unless promoted.
    - Do not edit external project repos unless explicitly named.
    - Do not add API calls, autonomous agents, automatic log systems, commits, or pushes unless explicitly requested.
  expected_output:
    - Primary finding or implementation summary.
    - Files created or changed, if any.
    - Tests or checks run.
    - Remaining limitations or authority ambiguity.

tool_roles:
