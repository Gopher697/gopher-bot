    interpretation: "Prior Gemma Starship empty-output result is settings/extraction/thinking-path suspect. Do not treat it as sole evidence of model failure, but manual Open WebUI follow-up confirmed unstable factual recall and current evidence makes Gemma unsuitable for Starship text-duty."
