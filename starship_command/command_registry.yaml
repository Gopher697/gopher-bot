version: 2

command_doctrine:
  principle: Codex and Starship Command are Engineering. The Captain approves, judges, and authorizes. Codex inspects, implements, tests, and reports. The user is never the integration layer.
  workflow_rules:
    - The GUI is the primary Captain-facing interface.
    - Terminal commands are Engineering actions, not routine instructions for the Captain.
    - Starship may inspect and test local resources directly when safe.
    - Runtime-changing model operations require explicit Captain authorization.
    - Starship may only change LM Studio runtime state through a verified local control path.
    - Model outputs do not auto-edit files, auto-promote crew roles, or launch autonomous agents.

station_order:
  - first_officer
  - engineering
  - archives
  - tactical
  - science
  - modding
  - design

stations:
  first_officer:
    display_name: First Officer
    division_name: Command Division
    standing_officer: First Officer
    authority: scoped
    specialist_default: true
    mission: Routing, prioritization, mission breakdown, cross-division assignment, specialist deployment, and unclear ownership.
    responsibilities:
      - Route missions to the correct division.
      - Coordinate cross-division work.
      - Generate specialist briefs without launching autonomous processes.
      - Own low-confidence routing and command authorization limits.
  engineering:
    display_name: Chief Engineer
    division_name: Engineering Division
    standing_officer: Chief Engineer
    authority: scoped
    specialist_default: true
    mission: Implementation, debugging, code, tests, scripts, repos, builds, CLI/backend work, and Codex execution.
    responsibilities:
      - Implement and debug code.
      - Run or design tests and scripts.
      - Handle repository, backend, and CLI work.
      - Preserve scope and show git status after changes.
  archives:
    display_name: Archivist
    division_name: Computer Core / Archives
    standing_officer: Chief Archivist
    authority: scoped
    specialist_default: true
    mission: Continuity, project memory, notes, corpus organization, reference systems, authority maps, stale context, and handoffs.
    responsibilities:
      - Organize notes, references, and source corpora.
      - Preserve continuity and bridge-log clarity.
      - Map authority, source, version, and current-state questions.
      - Treat historical material as reference unless promoted.
  tactical:
    display_name: Tactical Officer
    division_name: Tactical / Safety
    standing_officer: Tactical Officer
    authority: scoped
    specialist_default: true
    mission: Explicit risk and safety review; supporting review for destructive, broad, live-runtime, cross-project, or unclear-authority hazards.
    responsibilities:
      - Review safety, security, destructive-change, and source-confusion risks.
      - Support implementation, archive, and modding work when risk flags appear.
      - Escalate unclear authority or dangerous operations.
  science:
    display_name: Science Officer
    division_name: Science / Game Intelligence
    standing_officer: Science Officer
    authority: scoped
    specialist_default: true
    mission: Game-analysis assistants, game workspaces, save-state tracking, gameplay decision support, strategy analysis, simulation analysis, and adaptive game-agent systems.
    responsibilities:
      - Analyze game state and strategy.
      - Support persistent game memory and save profiles.
      - Route game information into usable decision support.
  modding:
    display_name: Modding Lead
    division_name: Modding Division
    standing_officer: Modding Lead
    authority: scoped
    specialist_default: true
    mission: Mod design and triage, game mod constraints, translation workflows, loader/runtime concerns, version separation, mod-specific diagnosis, and game data/config issues.
    responsibilities:
      - Handle mod-specific diagnosis and data interpretation.
      - Track loader, runtime, localization, and version constraints.
      - Support implementation tasks inside mod repositories.
  design:
    display_name: Design Director
    division_name: Design Bureau
    standing_officer: Project Director
    authority: scoped
    specialist_default: true
    mission: Speculative game design, roadmap critique, faction/system design, design synthesis, design-lane boundaries, source-corpus-driven design interpretation, and project direction.
    responsibilities:
      - Clarify project direction and design-lane boundaries.
      - Synthesize source-corpus-driven design implications.
      - Critique roadmaps, factions, systems, and mechanics.

