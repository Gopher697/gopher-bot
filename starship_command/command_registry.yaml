    id: chatgpt_pro
    display_name: ChatGPT Pro
    category: chat_agent
    likely_starship_divisions:
      - Command Division
      - Computer Core / Archives
      - Design Bureau
    best_use:
      - Manual high-capability reasoning surface for planning, synthesis, and review.
      - External comparison point for Starship routing and prompt quality.
    limitations:
      - No verified callable integration exists in this repo.
      - OAuth or app login does not prove a local callable model endpoint.
    current_integration_status: manual
    access_method: Manual ChatGPT web or app session outside Starship Command.
    verification_needed:
      - Verify any future API or connector path separately before marking callable.
    hazards:
      - Do not treat Pro subscription access as Open WebUI or MCP callability.
      - Do not route private repo state to it automatically.
